# VelaFlow Enterprise — API Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velaflow-api
  namespace: velaflow
  labels:
    app.kubernetes.io/name: velaflow-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: velaflow-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: velaflow-api
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: velaflow-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: velaflow/enterprise-api:1.2.0
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: velaflow-config
            - secretRef:
                name: velaflow-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data/medallion
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: velaflow-data-pvc
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velaflow-sa
  namespace: velaflow
